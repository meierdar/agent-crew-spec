name: Update Board

on:
  push:
    paths:
      - '.ai/stories/**'
      - '.ai/epics/**'

jobs:
  update-board:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Generate BOARD.md
        run: |
          chmod +x ./ai-board-gen
          ./ai-board-gen > .ai/BOARD.md

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .ai/BOARD.md
          git diff --cached --quiet || git commit -m "chore: update board [skip ci]"
          git push
