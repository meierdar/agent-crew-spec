name: Update Board

on:
  push:
    paths:
      - '.ai/stories/**'
      - '.ai/epics/**'
  workflow_dispatch:  # Allow manual trigger from GitHub UI (Actions tab → Run workflow)

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update-board:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Generate BOARD.md
        run: |
          chmod +x ./bin/ai-board-gen
          ./bin/ai-board-gen > BOARD.md

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add BOARD.md
          git diff --cached --quiet || git commit -m "chore: update board [skip ci]"
          git push
